<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 800" width="2400" height="800">
  <defs>
    <linearGradient id="gold04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffacd"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#c5a03f"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="neon04" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow layer -->
  <text
    x="1200" y="570"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="460"
    font-weight="900"
    letter-spacing="5"
    fill="#ffd700"
    opacity="0.4"
    filter="url(#neon04)"
  >FINISH</text>
  <!-- Main text -->
  <text
    x="1200" y="570"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="460"
    font-weight="900"
    letter-spacing="5"
    fill="url(#gold04)"
    stroke="#ffe566"
    stroke-width="3"
    style="paint-order: stroke fill;"
  >FINISH</text>
</svg>